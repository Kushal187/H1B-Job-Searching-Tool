name: Monitor Jobs (Supabase)

on:
  schedule:
    - cron: "0 */6 * * *" # every 6 hours (UTC)
  workflow_dispatch:
    inputs:
      workers:
        description: "Number of scrape workers"
        required: false
        default: "15"
      ats:
        description: "Optional ATS filter (comma-separated: greenhouse,lever,ashby,workday)"
        required: false
        default: ""
      limit:
        description: "Optional company limit"
        required: false
        default: ""
      cleanup_days:
        description: "Auto-remove jobs older than N days after scraping"
        required: false
        default: "30"

concurrency:
  group: monitor-jobs-supabase
  cancel-in-progress: false

jobs:
  monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    env:
      SUPABASE_DB_URL: ${{ secrets.SUPABASE_DB_URL }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Resolve DATABASE_URL
        run: |
          if [ -n "${SUPABASE_DB_URL}" ]; then
            echo "DATABASE_URL=${SUPABASE_DB_URL}" >> "$GITHUB_ENV"
            exit 0
          fi

          if [ -n "${SUPABASE_PROJECT_REF}" ] && [ -n "${SUPABASE_DB_PASSWORD}" ]; then
            echo "DATABASE_URL=postgresql://postgres:${SUPABASE_DB_PASSWORD}@db.${SUPABASE_PROJECT_REF}.supabase.co:5432/postgres?sslmode=require" >> "$GITHUB_ENV"
            exit 0
          fi

          echo "Provide either SUPABASE_DB_URL, or SUPABASE_PROJECT_REF + SUPABASE_DB_PASSWORD."
          exit 1

      - name: Validate DATABASE_URL
        run: |
          if [ -z "${DATABASE_URL}" ]; then
            echo "DATABASE_URL was not resolved."
            exit 1
          fi

      - name: Ensure schema exists
        run: |
          python - <<'PY'
          from db import database
          database.init_db()
          print("Schema initialized")
          PY

      - name: Run monitor scrape
        run: |
          WORKERS="${{ github.event.inputs.workers }}"
          ATS="${{ github.event.inputs.ats }}"
          LIMIT="${{ github.event.inputs.limit }}"
          CLEANUP_DAYS="${{ github.event.inputs.cleanup_days }}"

          if [ -z "$WORKERS" ]; then WORKERS="15"; fi
          if [ -z "$CLEANUP_DAYS" ]; then CLEANUP_DAYS="30"; fi

          CMD=(python pipeline.py scrape --mode monitor -w "$WORKERS")
          if [ -n "$ATS" ]; then CMD+=(--ats "$ATS"); fi
          if [ -n "$LIMIT" ]; then CMD+=(--limit "$LIMIT"); fi

          printf 'Running: %q ' "${CMD[@]}"
          printf '\n'
          "${CMD[@]}"

          echo "Running cleanup for jobs older than ${CLEANUP_DAYS} days..."
          python - <<'PY'
          import os
          from db import database

          raw_days = (os.environ.get("CLEANUP_DAYS") or "").strip()
          days = int(raw_days) if raw_days else 30
          cutoff = f"-{days}"
          posted_expr = "COALESCE(NULLIF(posted_at, ''), first_seen_at)"

          rows = database.query(
              f"SELECT COUNT(*) as cnt FROM job_listings "
              f"WHERE {posted_expr} < datetime('now', ? || ' days')",
              (cutoff,),
          )
          count = rows[0]["cnt"] if rows else 0
          if count > 0:
              database.execute(
                  f"DELETE FROM job_listings "
                  f"WHERE id IN (SELECT id FROM job_listings "
                  f"WHERE {posted_expr} < datetime('now', ? || ' days'))",
                  (cutoff,),
              )
          print(f'Cleanup deleted: {count}')
          PY
          python pipeline.py export
        env:
          CLEANUP_DAYS: ${{ github.event.inputs.cleanup_days }}

      - name: Upload exports
        uses: actions/upload-artifact@v4
        with:
          name: monitor-output
          path: output/

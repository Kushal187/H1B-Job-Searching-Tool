<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Resume Autotailor</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="container">
    <header class="header">
      <div class="logo">RT</div>
      <div>
        <h1>Resume Autotailor</h1>
        <p class="sub">Capture JD, generate a tailored resume PDF.</p>
      </div>
    </header>

    <details class="settings-toggle">
      <summary>Settings</summary>
      <div class="settings-body">
        <label for="apiBase">API Base URL</label>
        <input id="apiBase" type="text" placeholder="http://localhost:8000" />
        <label for="profileId">Profile ID</label>
        <input id="profileId" type="number" min="1" placeholder="1" />
      </div>
    </details>

    <div class="actions">
      <button id="captureBtn" class="btn secondary">Capture JD</button>
      <button id="generateBtn" class="btn primary">Generate PDF</button>
    </div>

    <label for="jdText">Job Description</label>
    <textarea id="jdText" rows="10" placeholder="Click Capture or paste JD here..."></textarea>

    <div class="footer-row">
      <button id="downloadBtn" class="btn accent" disabled>Download PDF</button>
      <span id="status" class="status"></span>
    </div>

    <div id="warnings" class="warnings"></div>
    <pre id="meta" class="meta"></pre>
  </div>

  <script src="sidepanel.js"></script>
</body>
</html>
